version: "3.8"

services:
  frontend:
    build:
      context: .
      target: production
    container_name: property_group_frontend_prod
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - BACKEND_URL=http://host.docker.internal:8000
    restart: always
